# =============================================================================
# LedgerLock Application Configuration
# =============================================================================

# Application Name
spring.application.name=ledgerlock

# Server Configuration
server.port=${PORT:8080}

# =============================================================================
# Graceful Shutdown (Critical for Zero-Downtime Deployments)
# =============================================================================
# ENTERPRISE PATTERN: Graceful shutdown ensures in-flight transactions complete
# before the pod terminates during Kubernetes rolling updates.
#
# Flow: SIGTERM → Stop accepting new connections → Wait 30s → Force terminate
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# =============================================================================
# Database Configuration (Neon Postgres in Production)
# =============================================================================
# These values MUST be overridden via environment variables in production
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ledgerlock}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}

# HikariCP Connection Pool Settings (optimized for serverless DB)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# =============================================================================
# Flyway Database Migration
# =============================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# =============================================================================
# JWT Security Configuration
# =============================================================================
# CRITICAL: Override JWT_SECRET in production with a 256-bit key
jwt.secret=${JWT_SECRET:dev-only-secret-key-must-be-at-least-256-bits-long-for-hs256}

# Access token expiration (15 minutes in production, 24h for dev convenience)
# Short-lived access tokens limit exposure if token is compromised
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Refresh token expiration (7 days)
# Long-lived but server-side validated, supports rotation
jwt.refresh-token-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:7}

# Maximum concurrent sessions per user
# Oldest sessions are automatically revoked when limit is exceeded
jwt.max-active-sessions=${JWT_MAX_SESSIONS:5}

# =============================================================================
# Logging Configuration (with Correlation ID support)
# =============================================================================
logging.level.root=INFO
logging.level.com.ledgerlock=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.flywaydb=INFO

# Log pattern with correlation ID and trace ID for distributed tracing
# Format: timestamp [correlationId] [traceId] [thread] level logger - message
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{correlationId:-no-correlation-id}] [%X{traceId:-}] [%thread] %-5level %logger{36} - %msg%n

# =============================================================================
# Actuator (Health Checks, Metrics, Prometheus)
# =============================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,circuitbreakers,retries
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# Custom health indicators
management.health.db.enabled=true
management.health.redis.enabled=true
management.health.diskspace.enabled=true

# =============================================================================
# Resilience4j Circuit Breaker Configuration
# =============================================================================
# ENTERPRISE PATTERN: Circuit Breaker prevents cascading failures
# When a service fails repeatedly, the circuit "opens" and fails fast
# instead of waiting for timeouts, protecting the system from overload.

# Default circuit breaker settings
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=30s
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.slowCallRateThreshold=80
resilience4j.circuitbreaker.configs.default.slowCallDurationThreshold=5s
resilience4j.circuitbreaker.configs.default.eventConsumerBufferSize=10
# IMPORTANT: Ignore business exceptions - they should NOT trigger the circuit breaker
resilience4j.circuitbreaker.configs.default.ignoreExceptions=com.ledgerlock.exception.InsufficientFundsException,com.ledgerlock.exception.SelfTransferException,com.ledgerlock.exception.AccountNotFoundException,org.springframework.security.authentication.BadCredentialsException

# Transfer service circuit breaker (critical financial operation)
resilience4j.circuitbreaker.instances.transferService.baseConfig=default
resilience4j.circuitbreaker.instances.transferService.failureRateThreshold=30
resilience4j.circuitbreaker.instances.transferService.slowCallDurationThreshold=3s

# Auth service circuit breaker
resilience4j.circuitbreaker.instances.authService.baseConfig=default
resilience4j.circuitbreaker.instances.authService.failureRateThreshold=40

# =============================================================================
# Resilience4j Retry Configuration
# =============================================================================
resilience4j.retry.configs.default.maxAttempts=3
resilience4j.retry.configs.default.waitDuration=1s
resilience4j.retry.configs.default.enableExponentialBackoff=true
resilience4j.retry.configs.default.exponentialBackoffMultiplier=2
resilience4j.retry.configs.default.retryExceptions=java.io.IOException,java.sql.SQLException,org.springframework.dao.TransientDataAccessException

resilience4j.retry.instances.transferService.baseConfig=default
resilience4j.retry.instances.transferService.maxAttempts=2

# =============================================================================
# Resilience4j Time Limiter Configuration
# =============================================================================
resilience4j.timelimiter.configs.default.timeoutDuration=10s
resilience4j.timelimiter.configs.default.cancelRunningFuture=true

resilience4j.timelimiter.instances.transferService.timeoutDuration=5s

# =============================================================================
# OpenAPI / Swagger Configuration
# =============================================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# =============================================================================
# Field-Level Encryption (AES-256-GCM)
# =============================================================================
# CRITICAL: Set this in production! Generate with: openssl rand -base64 32
# For DEVELOPMENT ONLY: Using a stable default key to prevent data loss on restart
# In production, this MUST be overridden via LEDGERLOCK_ENCRYPTION_KEY environment variable
ledgerlock.encryption.key=${LEDGERLOCK_ENCRYPTION_KEY:MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=}

# =============================================================================
# Redis Configuration (Distributed Rate Limiting)
# =============================================================================
# Redis is used for distributed rate limiting across all application instances.
# Without Redis, rate limits only work per-pod (security vulnerability in K8s).
#
# For local development, Redis runs in docker-compose.
# For production, use managed Redis (AWS ElastiCache, Azure Cache, etc.)
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.timeout=2000
# Connection pool settings
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=4
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.max-wait=2000ms

# =============================================================================
# Fraud Detection Configuration
# =============================================================================
# Configurable thresholds for fraud detection rules
# In production, these would come from a rule engine or external config

# Velocity window: time period for counting transactions
ledgerlock.fraud.velocity-window-minutes=60

# Maximum transactions allowed in velocity window
ledgerlock.fraud.velocity-max-transactions=10

# Amount above which triggers large transaction alert
ledgerlock.fraud.large-transaction-threshold=5000

# Total amount in velocity window that triggers alert
ledgerlock.fraud.velocity-amount-threshold=10000

# =============================================================================
# Scheduled Tasks (Limit Resets)
# =============================================================================
spring.task.scheduling.pool.size=2

# =============================================================================
# Multi-Tier Cache Configuration (L1: Caffeine, L2: Redis)
# =============================================================================
# ENTERPRISE PATTERN: Two-level cache for maximum throughput.
# L1 (Caffeine): In-process, sub-microsecond reads, per-instance.
# L2 (Redis): Distributed, ~1ms reads, shared across instances.
#
# TTLs are tuned per data type based on write frequency:
# - User profiles change rarely → longer TTL (5 min)
# - Balances change on every transfer → short TTL (30s)
# - Idempotency keys are immutable → long TTL (24h)

# User profile / auth cache TTL (seconds)
ledgerlock.cache.user-ttl-seconds=300

# Account balance cache TTL (seconds) — short to limit stale reads
# Event-driven invalidation handles immediate consistency;
# TTL is a safety net for edge cases
ledgerlock.cache.balance-ttl-seconds=30

# Idempotency key cache TTL (seconds) — 24h matches idempotency window
ledgerlock.cache.idempotency-ttl-seconds=86400

# Account status cache TTL (seconds)
ledgerlock.cache.status-ttl-seconds=120

# L1 cache max entries (bounded to prevent OOM)
ledgerlock.cache.l1-max-size=1000

# =============================================================================
# OpenTelemetry Distributed Tracing
# =============================================================================
# ENTERPRISE PATTERN: Distributed tracing is mandatory for microservices
# debugging at scale. Every major bank uses it (HSBC, JPMorgan, Goldman).
#
# Traces are exported to Jaeger via OTLP protocol.
# Run: docker-compose -f infra/docker-compose.yml up -d jaeger
# View traces: http://localhost:16686

# Enable/disable tracing (set false in unit tests)
otel.enabled=${OTEL_ENABLED:true}

# OTLP exporter endpoint (Jaeger's OTLP gRPC receiver)
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

# Sampling ratio (1.0 = 100%, 0.1 = 10%)
# Use < 1.0 in production for cost control
otel.traces.sampler.ratio=${OTEL_SAMPLER_RATIO:1.0}
